<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Кабинет студента</title>
        <link rel="manifest" href="/static/manifest.json">
        <link rel="apple-touch-icon" href="/static/icons/android-chrome-192x192.png">
        <meta name="theme-color" content="#0d6efd">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="apple-mobile-web-app-title" content="Кабинет">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <style>
            .status-badge {
                font-size: 0.85em;
                padding: 0.25em 0.5em;
                border-radius: 0.25rem;
                margin-left: 8px;
                vertical-align: middle;
            }
            .status-submitted {
                background-color: #6c757d;
                color: white;
            }
            .status-in_review {
                background-color: #ffc107;
                color: #212529;
            }
            .status-approved {
                background-color: #28a745;
                color: white;
            }
            .status-rejected {
                background-color: #dc3545;
                color: white;
            }
            .review-block {
                background-color: #f8d7da;
                border-left: 4px solid #dc3545;
                padding: 0.75rem;
                margin-top: 0.75rem;
                font-size: 0.95em;
                border-radius: 0.25rem;
            }
        </style>
    </head>
    <body class="bg-light">
        <div class="container py-4">
            <h1 class="mb-4">Личный кабинет заочного студента</h1>

            <!-- Форма входа -->
            <div id="login-section" class="card p-4 mb-4">
                <h3>Вход</h3>
                <p>Введите ваш номер зачётки и пароль</p>
                <form id="login-form">
                    <div class="mb-3">
                        <input
                            type="text"
                            id="student-id"
                            class="form-control"
                            placeholder="Номер студента (например: 2023-IS-042)"
                            required
                        />
                    </div>
                    <div class="mb-3">
                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            placeholder="Пароль"
                            required
                        />
                    </div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </form>
            </div>

            <!-- Основной интерфейс -->
            <div id="main-section" style="display: none">
                <div
                    class="d-flex justify-content-between align-items-center mb-4"
                >
                    <h2>Добро пожаловать, <span id="student-name"></span>!</h2>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                            Сменить пароль
                        </button>
                        <button id="logout-btn" class="btn btn-outline-secondary">Выйти</button>
                    </div>
                </div>

                <!-- Полезные ссылки -->
                <div class="row mb-4">
                    <div class="col-md-3 col-sm-6 mb-2">
                        <a
                            href="https://www.politex.mogilev.by/zaochnik/raspisanie-zanyatiy-818"
                            class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center gap-2"
                            target="_blank"
                            rel="noopener"
                        >
                            <i class="bi bi-calendar2-week"></i> Расписание
                            занятий
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6 mb-2">
                        <a
                            href="https://www.politex.mogilev.by/zaochnik/uchebnye-materialy-282"
                            class="btn btn-outline-warning w-100 d-flex align-items-center justify-content-center gap-2"
                            target="_blank"
                            rel="noopener"
                        >
                            <i class="bi bi-book"></i> Учебные материалы
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6 mb-2">
                        <a
                            href="https://www.politex.mogilev.by/uchebnye-grafiki-126"
                            class="btn btn-outline-success w-100 d-flex align-items-center justify-content-center gap-2"
                            target="_blank"
                            rel="noopener"
                        >
                            <i class="bi bi-graph-up"></i> Учебные графики
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6 mb-2">
                        <a
                            href="https://www.politex.mogilev.by/zaochnik/raspisanie-konsultaciy-2099"
                            class="btn btn-outline-info w-100 d-flex align-items-center justify-content-center gap-2"
                            target="_blank"
                            rel="noopener"
                        >
                            <i class="bi bi-person-video3"></i> Расписание
                            консультаций
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6 mb-2">
                        <a
                            href="https://www.politex.mogilev.by/node/2026"
                            class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center gap-2"
                            target="_blank"
                            rel="noopener"
                        >
                            <i class="bi bi-cash-coin"></i> Оплата
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6 mb-2">
                        <a
                            href="https://www.politex.mogilev.by/"
                            class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2"
                            target="_blank"
                            rel="noopener"
                        >
                            <i class="bi bi-house-door"></i> Сайт учебного
                            заведения
                        </a>
                    </div>
                </div>

                <h3>Задания</h3>
                <div id="assignments"></div>

                <h3 class="mt-5">Успеваемость</h3>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Предмет</th>
                                <th>Оценка</th>
                                <th>Статус</th>
                                <th>Дата и время</th>
                            </tr>
                        </thead>
                        <tbody id="grades"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <script>
            // PWA: регистрация service worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js');
            }

            // Badge: обновляем иконку и заголовок вкладки
            async function updateBadge() {
                const token = localStorage.getItem('student_token');
                if (!token) return;
                try {
                    const res = await fetch('/api/badge', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!res.ok) return;
                    const { count } = await res.json();
                    if ('setAppBadge' in navigator) {
                        count > 0 ? navigator.setAppBadge(count) : navigator.clearAppBadge();
                    }
                    document.title = count > 0 ? `(${count}) Кабинет студента` : 'Кабинет студента';
                } catch {}
            }

            setInterval(updateBadge, 60000);

            function deadlineBadge(deadlineStr) {
                if (!deadlineStr) return '<span class="badge bg-secondary">Без дедлайна</span>';
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                const due = new Date(deadlineStr);
                const days = Math.round((due - now) / 86400000);
                if (days < 0) return `<span class="badge bg-danger">Просрочено (${due.toLocaleDateString('ru-RU')})</span>`;
                if (days <= 7) return `<span class="badge bg-warning text-dark">Дедлайн: ${due.toLocaleDateString('ru-RU')} (${days} дн.)</span>`;
                return `<span class="badge bg-success">Дедлайн: ${due.toLocaleDateString('ru-RU')}</span>`;
            }

            // Вспомогательная функция для заголовков авторизации
            function getAuthHeaders() {
                const token = localStorage.getItem("student_token");
                return token ? { Authorization: `Bearer ${token}` } : {};
            }

            // Переключение между формами
            function showLogin() {
                document.getElementById("login-section").style.display =
                    "block";
                document.getElementById("main-section").style.display = "none";
            }
            function showMain() {
                document.getElementById("login-section").style.display = "none";
                document.getElementById("main-section").style.display = "block";
            }

            // Инициализация при загрузке страницы
            window.addEventListener("load", () => {
                const token = localStorage.getItem("student_token");
                const name = localStorage.getItem("student_name");
                if (token && name) {
                    document.getElementById("student-name").textContent = name;
                    loadAssignments();
                    loadGrades();
                    showMain();
                } else {
                    showLogin();
                }
            });

            // Вход
            document
                .getElementById("login-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const studentId = document
                        .getElementById("student-id")
                        .value.trim();
                    const password = document
                        .getElementById("password")
                        .value.trim();
                    if (!studentId || !password) return;

                    try {
                        const res = await fetch("/api/login", {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/x-www-form-urlencoded",
                            },
                            body: `student_id=${encodeURIComponent(studentId)}&password=${encodeURIComponent(password)}`,
                        });
                        if (!res.ok) throw new Error("Неверные данные");

                        const data = await res.json();
                        localStorage.setItem("student_token", data.token);
                        localStorage.setItem(
                            "student_name",
                            `${data.user.last_name} ${data.user.first_name}${data.user.patronymic ? " " + data.user.patronymic : ""}`,
                        );
                        document.getElementById("student-name").textContent =
                            `${data.user.last_name} ${data.user.first_name}${data.user.patronymic ? " " + data.user.patronymic : ""}`;
                        loadAssignments();
                        loadGrades();
                        showMain();
                    } catch (err) {
                        alert("Ошибка входа: " + err.message);
                    }
                });

            // Выход
            document
                .getElementById("logout-btn")
                .addEventListener("click", () => {
                    localStorage.removeItem("student_token");
                    localStorage.removeItem("student_name");
                    showLogin();
                });

            // Загрузка заданий
            async function loadAssignments() {
                try {
                    const res = await fetch("/api/assignments/me", {
                        headers: getAuthHeaders(),
                    });
                    if (!res.ok) {
                        if (res.status === 401 || res.status === 403) {
                            alert("Сессия истекла. Пожалуйста, войдите снова.");
                            localStorage.removeItem("student_token");
                            localStorage.removeItem("student_name");
                            showLogin();
                            return;
                        }
                        throw new Error("Ошибка загрузки");
                    }
                    const assignments = await res.json();
                    const cont = document.getElementById("assignments");
                    cont.innerHTML = "";

                    for (const a of assignments) {
                        const deadline = deadlineBadge(a.deadline);
                        const submittedAt = a.submitted_at
                            ? new Date(a.submitted_at).toLocaleDateString(
                                  "ru-RU",
                              )
                            : null;
                        const dateStr = submittedAt ? ` (${submittedAt})` : "";

                        let statusBadge = "";
                        if (a.status_label && a.status_label !== "—") {
                            let statusClass = "status-submitted";
                            const classMap = {
                                submitted: "status-submitted",
                                in_review: "status-in_review",
                                approved: "status-approved",
                                rejected: "status-rejected",
                                resubmitted: "status-rejected",
                            };
                            statusClass =
                                classMap[a.status] || "status-submitted";
                            statusBadge = `<span class="status-badge ${statusClass}">${a.status_label}${dateStr}</span>`;
                        } else {
                            statusBadge = `<span class="status-badge status-submitted">Не отправлено</span>`;
                        }

                        let reviewBlock = "";
                        if (
                            (a.status === "rejected" ||
                                a.status === "resubmitted") &&
                            a.review
                        ) {
                            reviewBlock = `<div class="review-block"><strong>Рецензия:</strong> ${a.review}</div>`;
                        }

                        let feedbackBlock = "";
                        if (a.has_teacher_feedback) {
                            feedbackBlock = `
              <button class="btn btn-sm btn-outline-info mt-2 download-feedback"
                      data-submission-id="${a.submission_id}">
                📎 Скачать комментарий преподавателя
              </button>
            `;
                        }

                        let actionBlock = "";
                        if (a.final_grade_blocked) {
                            const statusText = a.final_grade_status
                                ? `Оценка выставлена: ${a.final_grade_status}.`
                                : "Оценка по предмету уже выставлена.";
                            actionBlock = `<p class="text-muted">${statusText} Повторная сдача недоступна.</p>`;
                        } else if (a.status === "approved") {
                            // ничего
                        } else if (a.status === "in_review") {
                            actionBlock =
                                '<p class="text-muted">Работа проверяется преподавателем</p>';
                        } else {
                            actionBlock = `
              <form class="submit-form" data-assignment-id="${a.id}">
                <input type="file" class="form-control form-control-sm d-inline-block w-auto me-2" multiple required>
                <button type="submit" class="btn btn-primary btn-sm">Отправить</button>
              </form>
            `;
                        }

                        const el = document.createElement("div");
                        el.className = "card mb-3";
                        el.innerHTML = `
            <div class="card-body">
              <h6 class="text-muted">${a.subject}</h6>
              <p class="text-muted mb-2">Преподаватель: ${a.teachers}</p>
              <h5>${a.title} ${statusBadge}</h5>
              <p>${a.description}</p>
              <p class="mb-2">${deadline}</p>
              ${reviewBlock}
              ${feedbackBlock}
              ${actionBlock}
            </div>
          `;
                        cont.appendChild(el);
                    }

                    // Обработчики отправки
                    document
                        .querySelectorAll(".submit-form")
                        .forEach((form) => {
                            form.addEventListener("submit", async (e) => {
                                e.preventDefault();
                                const assignmentId =
                                    e.target.dataset.assignmentId;
                                const files = Array.from(
                                    e.target.querySelector('input[type="file"]')
                                        .files,
                                );
                                if (!files.length) return;

                                const formData = new FormData();
                                files.forEach((f) =>
                                    formData.append("files", f),
                                );

                                try {
                                    const res = await fetch(
                                        `/api/submit/${assignmentId}`,
                                        {
                                            method: "POST",
                                            headers: getAuthHeaders(),
                                            body: formData,
                                        },
                                    );

                                    if (res.ok) {
                                        alert("Работа отправлена!");
                                        loadAssignments();
                                    } else {
                                        if (
                                            res.status === 401 ||
                                            res.status === 403
                                        ) {
                                            alert(
                                                "Сессия истекла. Пожалуйста, войдите снова.",
                                            );
                                            localStorage.removeItem(
                                                "student_token",
                                            );
                                            localStorage.removeItem(
                                                "student_name",
                                            );
                                            showLogin();
                                            return;
                                        }
                                        const err = await res
                                            .json()
                                            .catch(() => ({
                                                detail: "Неизвестная ошибка",
                                            }));
                                        alert("Ошибка: " + (err.detail || ""));
                                    }
                                } catch (err) {
                                    console.error("Ошибка при отправке:", err);
                                    alert(
                                        "Не удалось отправить работу. Проверьте соединение.",
                                    );
                                }
                            });
                        });

                    // Обработчики скачивания комментариев
                    document
                        .querySelectorAll(".download-feedback")
                        .forEach((btn) => {
                            btn.addEventListener("click", async (e) => {
                                const submissionId =
                                    e.target.dataset.submissionId;
                                try {
                                    const res = await fetch(
                                        `/api/download/feedback/${submissionId}`,
                                        {
                                            headers: getAuthHeaders(),
                                        },
                                    );
                                    if (!res.ok)
                                        throw new Error("Файл не найден");

                                    const blob = await res.blob();
                                    const url =
                                        window.URL.createObjectURL(blob);
                                    const a = document.createElement("a");
                                    a.href = url;
                                    a.download =
                                        "комментарий_преподавателя." +
                                        (blob.type.split("/")[1] || "bin");
                                    document.body.appendChild(a);
                                    a.click();
                                    window.URL.revokeObjectURL(url);
                                    a.remove();
                                } catch (err) {
                                    alert(
                                        "Не удалось скачать файл: " +
                                            err.message,
                                    );
                                }
                            });
                        });
                } catch (err) {
                    console.error("Ошибка при загрузке заданий:", err);
                    if (
                        err.message.includes("401") ||
                        err.message.includes("403")
                    ) {
                        alert("Сессия истекла. Пожалуйста, войдите снова.");
                        localStorage.removeItem("student_token");
                        localStorage.removeItem("student_name");
                        showLogin();
                    } else {
                        alert("Ошибка загрузки заданий: " + err.message);
                    }
                }
            }

            // Загрузка успеваемости
            async function loadGrades() {
                try {
                    const res = await fetch("/api/grades/me", {
                        headers: getAuthHeaders(),
                    });
                    if (!res.ok) {
                        if (res.status === 401 || res.status === 403) {
                            alert("Сессия истекла. Пожалуйста, войдите снова.");
                            localStorage.removeItem("student_token");
                            localStorage.removeItem("student_name");
                            showLogin();
                            return;
                        }
                        throw new Error("Ошибка загрузки");
                    }
                    const grades = await res.json();
                    const tbody = document.getElementById("grades");
                    tbody.innerHTML = "";
                    grades.forEach((g) => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
            <td>${g.subject}</td>
            <td>${g.grade || "–"}</td>
            <td>${g.status || "–"}</td>
            <td>${g.graded_at || "—"}</td>
          `;
                        tbody.appendChild(tr);
                    });
                } catch (err) {
                    console.warn(
                        "Не удалось загрузить успеваемость:",
                        err.message,
                    );
                }
            }
        </script>

    <!-- Модальное окно: смена пароля -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Сменить пароль</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="change-password-alert" class="alert d-none"></div>
                    <form id="change-password-form">
                        <div class="mb-3">
                            <label class="form-label">Текущий пароль</label>
                            <input type="password" id="cp-old" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Новый пароль</label>
                            <input type="password" id="cp-new" class="form-control" minlength="8" required>
                            <div class="form-text">Минимум 8 символов</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Повторите новый пароль</label>
                            <input type="password" id="cp-confirm" class="form-control" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="cp-submit-btn">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cp-submit-btn').addEventListener('click', async () => {
            const alert = document.getElementById('change-password-alert');
            const oldPwd = document.getElementById('cp-old').value;
            const newPwd = document.getElementById('cp-new').value;
            const confirm = document.getElementById('cp-confirm').value;

            alert.className = 'alert d-none';

            if (newPwd !== confirm) {
                alert.className = 'alert alert-danger';
                alert.textContent = 'Новые пароли не совпадают';
                return;
            }
            if (newPwd.length < 8) {
                alert.className = 'alert alert-danger';
                alert.textContent = 'Пароль должен содержать минимум 8 символов';
                return;
            }

            const token = localStorage.getItem('token');
            const body = new URLSearchParams({ old_password: oldPwd, new_password: newPwd });
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/x-www-form-urlencoded' },
                body
            });

            if (res.ok) {
                alert.className = 'alert alert-success';
                alert.textContent = 'Пароль успешно изменён';
                document.getElementById('change-password-form').reset();
            } else {
                const err = await res.json();
                alert.className = 'alert alert-danger';
                alert.textContent = err.detail || 'Ошибка при смене пароля';
            }
        });

        document.getElementById('changePasswordModal').addEventListener('hidden.bs.modal', () => {
            document.getElementById('change-password-form').reset();
            document.getElementById('change-password-alert').className = 'alert d-none';
        });
    </script>
    </body>
</html>
