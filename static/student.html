<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Кабинет студента</title>
        <link rel="manifest" href="/static/manifest.json">
        <link rel="apple-touch-icon" href="/static/icons/android-chrome-192x192.png">
        <meta name="theme-color" content="#0d6efd">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="apple-mobile-web-app-title" content="Кабинет">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
        <style>
            :root {
                --brand: #0d6efd;
                --brand-dark: #0a58ca;
            }
            body { background: #f0f4f8; min-height: 100vh; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

            /* Navbar */
            .app-navbar {
                background: linear-gradient(135deg, var(--brand), var(--brand-dark));
                padding: 0 1rem;
                height: 56px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                box-shadow: 0 2px 12px rgba(13, 110, 253, .35);
            }
            .app-navbar .brand {
                color: #fff;
                font-weight: 700;
                font-size: 1.1rem;
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .app-navbar .brand i { font-size: 1.3rem; }
            .app-navbar .role-badge { background: rgba(255,255,255,.2); color: #fff; font-size: .7rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; letter-spacing: .06em; text-transform: uppercase; }
            .app-navbar .nav-actions { display: flex; gap: 8px; align-items: center; }

            /* Login */
            .login-wrapper {
                min-height: calc(100vh - 56px);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
            }
            .login-card {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 4px 24px rgba(0,0,0,.10);
                padding: 2.5rem 2rem;
                width: 100%;
                max-width: 400px;
                border-top: 3px solid var(--brand);
            }
            .login-card .login-icon {
                width: 56px; height: 56px;
                background: linear-gradient(135deg, var(--brand), var(--brand-dark));
                border-radius: 14px;
                display: flex; align-items: center; justify-content: center;
                margin: 0 auto 1.25rem;
            }
            .login-card .login-icon i { color: #fff; font-size: 1.6rem; }
            .login-card h2 { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: .25rem; letter-spacing: -0.01em; }
            .login-card .login-sub { text-align: center; color: var(--brand); font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; }

            /* Status badges */
            .status-badge {
                font-size: 0.8em;
                padding: 0.2em 0.55em;
                border-radius: 0.25rem;
                margin-left: 6px;
                vertical-align: middle;
                font-weight: 500;
            }
            .status-submitted  { background: #e9ecef; color: #495057; }
            .status-in_review  { background: #fff3cd; color: #856404; }
            .status-approved   { background: #d1e7dd; color: #0a3622; }
            .status-rejected   { background: #f8d7da; color: #58151c; }

            /* Cards */
            .assignment-card {
                border: none;
                border-left: 4px solid #dee2e6;
                border-radius: 12px;
                box-shadow: 0 1px 6px rgba(0,0,0,.07);
                margin-bottom: 1rem;
                transition: box-shadow .15s;
            }
            .assignment-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.12); }
            .assignment-card.card-status-approved    { border-left-color: #198754; }
            .assignment-card.card-status-in_review   { border-left-color: #f59e0b; }
            .assignment-card.card-status-rejected    { border-left-color: #dc3545; }
            .assignment-card.card-status-resubmitted { border-left-color: #dc3545; }
            .assignment-card.card-status-submitted   { border-left-color: #6c757d; }
            .assignment-card.card-status-pending     { border-left-color: var(--brand); }
            .assignment-card .subject-label {
                font-size: .8rem;
                font-weight: 600;
                letter-spacing: .04em;
                text-transform: uppercase;
                color: var(--brand);
                margin-bottom: 2px;
            }
            .assignment-card .teacher-label { color: #6c757d; font-size: .85rem; margin-bottom: .5rem; }

            .review-block {
                background: #fff5f5;
                border-left: 3px solid #dc3545;
                padding: 0.6rem 0.75rem;
                margin-top: 0.75rem;
                font-size: 0.9em;
                border-radius: 0 6px 6px 0;
            }

            /* Quick-links */
            .quick-links-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.6rem;
            }
            @media (min-width: 480px) { .quick-links-grid { grid-template-columns: repeat(6, 1fr); } }
            .quick-link-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.35rem;
                padding: 0.75rem 0.25rem;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 1px 4px rgba(0,0,0,.07);
                text-decoration: none;
                color: #495057;
                font-size: 0.72rem;
                font-weight: 500;
                text-align: center;
                transition: box-shadow .15s, transform .15s;
            }
            .quick-link-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,.12); transform: translateY(-1px); color: #495057; }
            .quick-link-icon {
                width: 38px; height: 38px;
                border-radius: 10px;
                display: flex; align-items: center; justify-content: center;
                font-size: 1rem;
            }
            .ql-blue   { background: #dbeafe; color: #1d6fef; }
            .ql-orange { background: #fef3c7; color: #d97706; }
            .ql-green  { background: #d1fae5; color: #059669; }
            .ql-teal   { background: #cffafe; color: #0891b2; }
            .ql-red    { background: #fee2e2; color: #dc2626; }
            .ql-gray   { background: #f1f5f9; color: #64748b; }

            /* Assignments grid on desktop */
            @media (min-width: 768px) {
                #assignments {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 1rem;
                    align-items: start;
                }
                #assignments .assignment-card { margin-bottom: 0; }
            }

            /* Table */
            .table { border-radius: 10px; overflow: hidden; }
            .section-title {
                font-size: 1rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: .06em;
                color: #495057;
                margin: 2rem 0 1rem;
            }

            /* Toast */
            .toast-container { z-index: 9999; }
        </style>
    </head>
    <body>

        <!-- Navbar (hidden until logged in) -->
        <nav class="app-navbar" id="app-navbar" style="display:none">
            <a href="#" class="brand">
                <i class="bi bi-mortarboard-fill"></i>
                КабинетЗаочника
                <span class="role-badge">Студент</span>
            </a>
            <div class="nav-actions">
                <button class="btn btn-sm btn-light" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                    <i class="bi bi-key"></i><span class="d-none d-sm-inline ms-1">Пароль</span>
                </button>
                <button id="logout-btn" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-box-arrow-right"></i><span class="d-none d-sm-inline ms-1">Выйти</span>
                </button>
            </div>
        </nav>

        <!-- Login -->
        <div id="login-section" class="login-wrapper">
            <div class="login-card">
                <div class="login-icon"><i class="bi bi-mortarboard-fill"></i></div>
                <h2>КабинетЗаочника</h2>
                <p class="login-sub">Личный кабинет студента</p>
                <div id="login-error" class="alert alert-danger d-none py-2"></div>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Номер студента</label>
                        <input type="text" id="student-id" class="form-control" placeholder="Например: 2023-IS-042" required />
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Пароль</label>
                        <input type="password" id="password" class="form-control" placeholder="Введите пароль" required />
                    </div>
                    <button type="submit" class="btn btn-primary w-100" style="border-radius:8px;padding:.6rem">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Войти
                    </button>
                </form>
                <p class="text-center text-muted mt-3" style="font-size:.8rem">
                    Преподаватель? <a href="/teacher">Войти в кабинет преподавателя</a>
                </p>
            </div>
        </div>

        <!-- Main -->
        <div id="main-section" style="display:none">
            <div class="container py-4">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <span class="text-muted" style="font-size:.9rem"><i class="bi bi-person-circle me-1"></i><span id="student-name"></span></span>
                </div>

                <!-- Quick links -->
                <div class="quick-links-grid mb-4">
                    <a href="https://www.politex.mogilev.by/zaochnik/raspisanie-zanyatiy-818" class="quick-link-item" target="_blank" rel="noopener">
                        <div class="quick-link-icon ql-blue"><i class="bi bi-calendar2-week"></i></div>
                        <span>Расписание</span>
                    </a>
                    <a href="https://www.politex.mogilev.by/zaochnik/uchebnye-materialy-282" class="quick-link-item" target="_blank" rel="noopener">
                        <div class="quick-link-icon ql-orange"><i class="bi bi-book"></i></div>
                        <span>Материалы</span>
                    </a>
                    <a href="https://www.politex.mogilev.by/uchebnye-grafiki-126" class="quick-link-item" target="_blank" rel="noopener">
                        <div class="quick-link-icon ql-green"><i class="bi bi-graph-up"></i></div>
                        <span>Уч. графики</span>
                    </a>
                    <a href="https://www.politex.mogilev.by/zaochnik/raspisanie-konsultaciy-2099" class="quick-link-item" target="_blank" rel="noopener">
                        <div class="quick-link-icon ql-teal"><i class="bi bi-person-video3"></i></div>
                        <span>Консультации</span>
                    </a>
                    <a href="https://www.politex.mogilev.by/node/2026" class="quick-link-item" target="_blank" rel="noopener">
                        <div class="quick-link-icon ql-red"><i class="bi bi-cash-coin"></i></div>
                        <span>Оплата</span>
                    </a>
                    <a href="https://www.politex.mogilev.by/" class="quick-link-item" target="_blank" rel="noopener">
                        <div class="quick-link-icon ql-gray"><i class="bi bi-house-door"></i></div>
                        <span>Сайт</span>
                    </a>
                </div>

                <p class="section-title"><i class="bi bi-journal-text me-2"></i>Задания</p>
                <div id="assignments"></div>

                <p class="section-title"><i class="bi bi-bar-chart-line me-2"></i>Успеваемость</p>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover table-sm bg-white">
                        <thead class="table-light">
                            <tr>
                                <th>Предмет</th>
                                <th>Оценка</th>
                                <th>Статус</th>
                                <th class="d-none d-sm-table-cell">Дата</th>
                            </tr>
                        </thead>
                        <tbody id="grades"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="app-toast" class="toast align-items-center border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body" id="app-toast-body"></div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        </div>

        <!-- Модальное окно: смена пароля -->
        <div class="modal fade" id="changePasswordModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Сменить пароль</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="change-password-alert" class="alert d-none"></div>
                        <form id="change-password-form">
                            <div class="mb-3">
                                <label class="form-label">Текущий пароль</label>
                                <input type="password" id="cp-old" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Новый пароль</label>
                                <input type="password" id="cp-new" class="form-control" minlength="8" required>
                                <div class="form-text">Минимум 8 символов</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Повторите новый пароль</label>
                                <input type="password" id="cp-confirm" class="form-control" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="button" class="btn btn-primary" id="cp-submit-btn">Сохранить</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js');
            }

            function escapeHtml(str) {
                if (str == null) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            async function updateBadge() {
                const token = localStorage.getItem('student_token');
                if (!token) return;
                try {
                    const res = await fetch('/api/badge', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (!res.ok) return;
                    const { count } = await res.json();
                    if ('setAppBadge' in navigator) {
                        count > 0 ? navigator.setAppBadge(count) : navigator.clearAppBadge();
                    }
                    document.title = count > 0 ? `(${count}) Кабинет студента` : 'Кабинет студента';
                } catch {}
            }
            setInterval(updateBadge, 60000);

            function showToast(msg, type = 'success') {
                const el = document.getElementById('app-toast');
                el.className = `toast align-items-center text-bg-${type} border-0`;
                document.getElementById('app-toast-body').textContent = msg;
                bootstrap.Toast.getOrCreateInstance(el, { delay: 3500 }).show();
            }

            function deadlineBadge(deadlineStr) {
                if (!deadlineStr) return '<span class="badge bg-secondary">Без дедлайна</span>';
                const now = new Date(); now.setHours(0,0,0,0);
                const due = new Date(deadlineStr);
                const days = Math.round((due - now) / 86400000);
                if (days < 0) return `<span class="badge bg-danger">Просрочено (${due.toLocaleDateString('ru-RU')})</span>`;
                if (days <= 7) return `<span class="badge bg-warning text-dark">Дедлайн: ${due.toLocaleDateString('ru-RU')} (${days} дн.)</span>`;
                return `<span class="badge bg-success">Дедлайн: ${due.toLocaleDateString('ru-RU')}</span>`;
            }

            function getAuthHeaders() {
                const token = localStorage.getItem('student_token');
                return token ? { Authorization: `Bearer ${token}` } : {};
            }

            function showLogin() {
                document.getElementById('app-navbar').style.display = 'none';
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('main-section').style.display = 'none';
            }
            function showMain() {
                document.getElementById('app-navbar').style.display = 'flex';
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-section').style.display = 'block';
            }

            window.addEventListener('load', () => {
                const token = localStorage.getItem('student_token');
                const name = localStorage.getItem('student_name');
                if (token && name) {
                    document.getElementById('student-name').textContent = name;
                    loadAssignments();
                    loadGrades();
                    showMain();
                    updateBadge();
                } else {
                    showLogin();
                }
            });

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type=submit]');
                btn.disabled = true;
                const errEl = document.getElementById('login-error');
                errEl.classList.add('d-none');
                const studentId = document.getElementById('student-id').value.trim();
                const password = document.getElementById('password').value.trim();
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `student_id=${encodeURIComponent(studentId)}&password=${encodeURIComponent(password)}`
                    });
                    if (!res.ok) throw new Error('Неверный номер студента или пароль');
                    const data = await res.json();
                    const fullName = `${data.user.last_name} ${data.user.first_name}${data.user.patronymic ? ' ' + data.user.patronymic : ''}`;
                    localStorage.setItem('student_token', data.token);
                    localStorage.setItem('student_name', fullName);
                    document.getElementById('student-name').textContent = fullName;
                    loadAssignments();
                    loadGrades();
                    showMain();
                    updateBadge();
                } catch (err) {
                    errEl.textContent = err.message;
                    errEl.classList.remove('d-none');
                } finally {
                    btn.disabled = false;
                }
            });

            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('student_token');
                localStorage.removeItem('student_name');
                showLogin();
            });

            function handleAuthError() {
                showToast('Сессия истекла — войдите снова', 'warning');
                localStorage.removeItem('student_token');
                localStorage.removeItem('student_name');
                showLogin();
            }

            async function loadAssignments() {
                try {
                    const res = await fetch('/api/assignments/me', { headers: getAuthHeaders() });
                    if (res.status === 401 || res.status === 403) { handleAuthError(); return; }
                    if (!res.ok) throw new Error('Ошибка загрузки');
                    const assignments = await res.json();
                    const cont = document.getElementById('assignments');
                    cont.innerHTML = '';

                    if (assignments.length === 0) {
                        cont.innerHTML = '<p class="text-muted">Нет активных заданий</p>';
                        return;
                    }

                    for (const a of assignments) {
                        const deadline = deadlineBadge(a.deadline);
                        const submittedAt = a.submitted_at ? new Date(a.submitted_at).toLocaleDateString('ru-RU') : null;
                        const dateStr = submittedAt ? ` (${submittedAt})` : '';

                        const classMap = { submitted: 'status-submitted', in_review: 'status-in_review', approved: 'status-approved', rejected: 'status-rejected', resubmitted: 'status-rejected', notebook_sent: 'status-in_review' };
                        let statusBadge = '';
                        if (a.status_label && a.status_label !== '—') {
                            statusBadge = `<span class="status-badge ${classMap[a.status] || 'status-submitted'}">${a.status_label}${dateStr}</span>`;
                        } else {
                            statusBadge = `<span class="status-badge status-submitted">Не отправлено</span>`;
                        }

                        let reviewBlock = '';
                        if ((a.status === 'rejected' || a.status === 'resubmitted') && a.review) {
                            reviewBlock = `<div class="review-block"><strong>Рецензия:</strong> ${escapeHtml(a.review)}</div>`;
                        }

                        let feedbackBlock = '';
                        if (a.has_teacher_feedback) {
                            feedbackBlock = `<button class="btn btn-sm btn-outline-info mt-2 download-feedback" data-submission-id="${a.submission_id}"><i class="bi bi-paperclip me-1"></i>Скачать комментарий преподавателя</button>`;
                        }

                        const isNotebook = a.submission_type === 'notebook';
                        let actionBlock = '';
                        if (a.final_grade_blocked) {
                            const statusText = a.final_grade_status ? `Оценка выставлена: ${a.final_grade_status}.` : 'Оценка по предмету уже выставлена.';
                            actionBlock = `<p class="text-muted mb-0 mt-2" style="font-size:.875rem">${statusText} Повторная сдача недоступна.</p>`;
                        } else if (a.status === 'approved') {
                            // nothing
                        } else if (isNotebook) {
                            if (a.status === 'notebook_sent') {
                                actionBlock = '<p class="text-muted mb-0 mt-2" style="font-size:.875rem"><i class="bi bi-envelope-check me-1"></i>Тетрадь отмечена как отправленная. Ожидайте проверки.</p>';
                            } else {
                                const btnLabel = a.status === 'rejected' ? 'Отметить повторную отправку' : 'Отметить как отправлено почтой';
                                actionBlock = `
                                    <div class="mt-2">
                                        <p class="text-muted mb-2" style="font-size:.875rem"><i class="bi bi-book me-1"></i>Выполните задание в тетради и отправьте её по почте. После отправки нажмите кнопку ниже.</p>
                                        <button type="button" class="btn btn-primary btn-sm notebook-send-btn" data-assignment-id="${a.id}">
                                            <i class="bi bi-envelope me-1"></i>${btnLabel}
                                        </button>
                                    </div>`;
                            }
                        } else if (a.status === 'in_review') {
                            actionBlock = '<p class="text-muted mb-0 mt-2" style="font-size:.875rem"><i class="bi bi-hourglass-split me-1"></i>Работа проверяется преподавателем</p>';
                        } else {
                            actionBlock = `
                                <form class="submit-form mt-2" data-assignment-id="${a.id}">
                                    <input type="file" class="d-none file-input" multiple>
                                    <div class="file-list mb-2"></div>
                                    <div class="d-flex align-items-center gap-2 flex-wrap">
                                        <button type="button" class="btn btn-outline-secondary btn-sm add-files-btn">
                                            <i class="bi bi-paperclip me-1"></i>Добавить файлы
                                        </button>
                                        <span class="file-count text-muted" style="font-size:.85rem">0 / 10 файлов</span>
                                        <button type="submit" class="btn btn-primary btn-sm">
                                            <i class="bi bi-cloud-upload me-1"></i>Отправить
                                        </button>
                                    </div>
                                </form>`;
                        }

                        const el = document.createElement('div');
                        el.className = `assignment-card card card-status-${a.status || 'pending'}`;
                        el.innerHTML = `
                            <div class="card-body">
                                <div class="subject-label">${escapeHtml(a.subject)}</div>
                                <div class="teacher-label"><i class="bi bi-person me-1"></i>${escapeHtml(a.teachers)}</div>
                                <h6 class="mb-1">${escapeHtml(a.title)} ${statusBadge}</h6>
                                <p class="text-muted mb-2" style="font-size:.9rem">${escapeHtml(a.description)}</p>
                                <div class="mb-1">${deadline}</div>
                                ${reviewBlock}
                                ${feedbackBlock}
                                ${actionBlock}
                            </div>`;
                        cont.appendChild(el);
                    }

                    const MAX_FILES = 10;
                    const formFileMaps = new Map();

                    function renderFileList(form, files) {
                        const list = form.querySelector('.file-list');
                        const counter = form.querySelector('.file-count');
                        counter.textContent = `${files.length} / ${MAX_FILES} файлов`;
                        if (!files.length) { list.innerHTML = ''; return; }
                        list.innerHTML = files.map((f, i) => `
                            <div class="d-flex align-items-center gap-2 mb-1" style="font-size:.85rem">
                                <i class="bi bi-file-earmark me-1 text-secondary"></i>
                                <span class="text-truncate" style="max-width:240px" title="${f.name}">${f.name}</span>
                                <span class="text-muted">(${(f.size/1024).toFixed(0)} КБ)</span>
                                <button type="button" class="btn-close btn-sm remove-file-btn" style="font-size:.65rem" data-idx="${i}"></button>
                            </div>`).join('');
                        list.querySelectorAll('.remove-file-btn').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const assignmentId = form.dataset.assignmentId;
                                const arr = formFileMaps.get(assignmentId) || [];
                                arr.splice(parseInt(btn.dataset.idx), 1);
                                formFileMaps.set(assignmentId, arr);
                                renderFileList(form, arr);
                            });
                        });
                    }

                    document.querySelectorAll('.submit-form').forEach(form => {
                        const assignmentId = form.dataset.assignmentId;
                        formFileMaps.set(assignmentId, []);
                        const fileInput = form.querySelector('.file-input');

                        form.querySelector('.add-files-btn').addEventListener('click', () => fileInput.click());

                        fileInput.addEventListener('change', () => {
                            const existing = formFileMaps.get(assignmentId) || [];
                            for (const f of fileInput.files) {
                                const idx = existing.findIndex(e => e.name === f.name);
                                if (idx !== -1) existing[idx] = f;
                                else if (existing.length < MAX_FILES) existing.push(f);
                                else { showToast(`Максимум ${MAX_FILES} файлов`, 'warning'); break; }
                            }
                            formFileMaps.set(assignmentId, existing);
                            renderFileList(form, existing);
                            fileInput.value = '';
                        });

                        form.addEventListener('submit', async (e) => {
                            e.preventDefault();
                            const btn = e.target.querySelector('button[type=submit]');
                            const files = formFileMaps.get(assignmentId) || [];
                            if (!files.length) { showToast('Выберите файлы для отправки', 'warning'); return; }
                            btn.disabled = true;
                            const formData = new FormData();
                            files.forEach(f => formData.append('files', f));
                            try {
                                const res = await fetch(`/api/submit/${assignmentId}`, { method: 'POST', headers: getAuthHeaders(), body: formData });
                                if (res.status === 401 || res.status === 403) { handleAuthError(); return; }
                                if (res.ok) {
                                    showToast('Работа успешно отправлена!');
                                    loadAssignments();
                                } else {
                                    const err = await res.json().catch(() => ({ detail: 'Неизвестная ошибка' }));
                                    showToast('Ошибка: ' + (err.detail || ''), 'danger');
                                }
                            } catch {
                                showToast('Не удалось отправить работу. Проверьте соединение.', 'danger');
                            } finally {
                                btn.disabled = false;
                            }
                        });
                    });

                    document.querySelectorAll('.notebook-send-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const b = e.currentTarget;
                            const assignmentId = b.dataset.assignmentId;
                            b.disabled = true;
                            try {
                                const res = await fetch(`/api/submit-notebook/${assignmentId}`, { method: 'POST', headers: getAuthHeaders() });
                                if (res.status === 401 || res.status === 403) { handleAuthError(); return; }
                                if (res.ok) {
                                    showToast('Отмечено! Преподаватель получит уведомление.');
                                    loadAssignments();
                                } else {
                                    const err = await res.json().catch(() => ({ detail: 'Ошибка' }));
                                    showToast('Ошибка: ' + (err.detail || ''), 'danger');
                                }
                            } catch {
                                showToast('Не удалось отметить отправку. Проверьте соединение.', 'danger');
                            } finally {
                                b.disabled = false;
                            }
                        });
                    });

                    document.querySelectorAll('.download-feedback').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const submissionId = e.target.closest('[data-submission-id]').dataset.submissionId;
                            try {
                                const res = await fetch(`/api/download/feedback/${submissionId}`, { headers: getAuthHeaders() });
                                if (!res.ok) throw new Error('Файл не найден');
                                const blob = await res.blob();
                                const url = window.URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url; a.download = 'комментарий_преподавателя.' + (blob.type.split('/')[1] || 'bin');
                                document.body.appendChild(a); a.click();
                                window.URL.revokeObjectURL(url); a.remove();
                            } catch (err) {
                                showToast('Не удалось скачать файл: ' + err.message, 'danger');
                            }
                        });
                    });
                } catch (err) {
                    console.error('Ошибка при загрузке заданий:', err);
                }
            }

            async function loadGrades() {
                try {
                    const res = await fetch('/api/grades/me', { headers: getAuthHeaders() });
                    if (res.status === 401 || res.status === 403) { handleAuthError(); return; }
                    if (!res.ok) throw new Error('Ошибка загрузки');
                    const grades = await res.json();
                    const tbody = document.getElementById('grades');
                    tbody.innerHTML = '';
                    if (grades.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="text-muted text-center">Нет данных</td></tr>';
                        return;
                    }
                    grades.forEach(g => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${g.subject}</td><td>${g.grade || '–'}</td><td>${g.status || '–'}</td><td class="d-none d-sm-table-cell">${g.graded_at || '—'}</td>`;
                        tbody.appendChild(tr);
                    });
                } catch (err) {
                    console.warn('Не удалось загрузить успеваемость:', err.message);
                }
            }

            document.getElementById('cp-submit-btn').addEventListener('click', async () => {
                const alertEl = document.getElementById('change-password-alert');
                const oldPwd = document.getElementById('cp-old').value;
                const newPwd = document.getElementById('cp-new').value;
                const confirm = document.getElementById('cp-confirm').value;
                alertEl.className = 'alert d-none';
                if (newPwd !== confirm) {
                    alertEl.className = 'alert alert-danger'; alertEl.textContent = 'Новые пароли не совпадают'; return;
                }
                if (newPwd.length < 8) {
                    alertEl.className = 'alert alert-danger'; alertEl.textContent = 'Пароль должен содержать минимум 8 символов'; return;
                }
                const token = localStorage.getItem('student_token');
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ old_password: oldPwd, new_password: newPwd })
                });
                if (res.ok) {
                    alertEl.className = 'alert alert-success'; alertEl.textContent = 'Пароль успешно изменён';
                    document.getElementById('change-password-form').reset();
                } else {
                    const err = await res.json();
                    alertEl.className = 'alert alert-danger'; alertEl.textContent = err.detail || 'Ошибка при смене пароля';
                }
            });

            document.getElementById('changePasswordModal').addEventListener('hidden.bs.modal', () => {
                document.getElementById('change-password-form').reset();
                document.getElementById('change-password-alert').className = 'alert d-none';
            });
        </script>
    </body>
</html>
